name: Weekly Update

on:
  schedule:
    # Run weekly on Mondays at 1:00 AM GMT
    - cron: "0 1 * * 1"
  workflow_dispatch:
    # Allow manual triggering

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
  GIST_ID: ${{ secrets.GIST_ID }}

permissions:
  contents: read

jobs:
  update-resources:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Preflight Validate Secrets and Gist Access
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "❌ Missing required secret: ANTHROPIC_API_KEY"
            exit 1
          fi

          if [ -z "${GIST_TOKEN:-}" ]; then
            echo "❌ Missing required secret: GIST_TOKEN or GITHUB_GIST_TOKEN"
            exit 1
          fi

          if [ -z "${GIST_ID:-}" ]; then
            echo "❌ Missing required secret: GIST_ID"
            exit 1
          fi

          if [[ "${GIST_ID}" =~ ^(ghp_|github_pat_) ]]; then
            echo "❌ GIST_ID appears to be a GitHub token. Set GIST_ID to the gist ID (or gist URL), not your PAT."
            exit 1
          fi

          if [[ "${GIST_ID}" =~ ^https?://gist\.github\.com/ ]]; then
            if [[ ! "${GIST_ID}" =~ ([0-9a-fA-F]{32})/?$ ]]; then
              echo "❌ GIST_ID was provided as a URL, but no valid 32-character gist ID could be extracted."
              echo "Set GIST_ID to a raw gist ID or a valid gist URL."
              exit 1
            fi
          fi

          echo "🔎 Checking Gist API access..."
          STATUS=$(curl -sS -o /tmp/gist-preflight-response.json -w "%{http_code}" \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/${GIST_ID}")

          if [ "$STATUS" != "200" ]; then
            echo "❌ Failed to access Gist ${GIST_ID} (HTTP status ${STATUS})."
            echo "Possible fixes: rotate token, ensure token has gist scope, and verify GIST_ID is correct."
            echo "--- response body ---"
            cat /tmp/gist-preflight-response.json
            exit 1
          fi

          echo "✅ Preflight passed: secrets are present and Gist is reachable."
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Fetch Current Resources
        id: fetch-current
        run: node scripts/fetch-current-resources.js

      - name: Generate New Resources
        id: generate-new
        run: node scripts/generate-resources.js

      - name: Merge and Update Weeks
        id: merge-resources
        run: node scripts/merge-and-update.js

      - name: Validate Schema
        run: node scripts/validate-schema.js

      - name: Update Gist
        run: node scripts/update-gist.js

      - name: Create Summary
        run: node scripts/create-summary.js

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-results
          path: |
            /tmp/current-resources.json
            /tmp/new-resources.json
            /tmp/merged-resources.json
            /tmp/automation-summary.json
          retention-days: 30
