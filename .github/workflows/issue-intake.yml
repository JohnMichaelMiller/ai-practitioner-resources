name: Issue Intake

on:
  workflow_dispatch:
  issues:
    types: [ opened, edited ]
  issue_comment:
    types: [ created, edited ]

permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  intake:
    runs-on: ubuntu-latest
    # Skip issues created by the path-test driver — those are driven by
    # drive-workflow-paths.yml and must not be processed by production automation.
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.issue.labels.*.name, 'workflow-path-test')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (production only)
        run: npm ci --omit=dev

      - name: Initialize intake
        id: intake
        env:
          # Use a PAT that can access user-level Projects v2 (GITHUB_TOKEN cannot for user-owned projects)
          TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          INTAKE_MANAGE_PROJECT: "true"
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_NUMBER: 1
          PROJECT_STATUS_FIELD_NAME: Status
        run: node scripts/issue-intake.js

      - name: Copilot PM review (AI)
        if: "!contains(fromJSON(steps.intake.outputs.labels_json || '[]'),
          'needs-details')"
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PM_MODEL: claude-sonnet-4-5-20250929
        run: node scripts/pm-review.js
