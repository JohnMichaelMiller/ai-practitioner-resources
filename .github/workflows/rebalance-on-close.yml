name: Rebalance on Close

on:
  workflow_dispatch:
  issues:
    types: [ closed ]

permissions:
  issues: write
  contents: read
  repository-projects: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    # Skip workflow-path-test issues — their close events are driven by
    # drive-workflow-paths.yml and must not trigger production rebalancing.
    if: "!contains(github.event.issue.labels.*.name, 'workflow-path-test')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (production only)
        run: npm ci --omit=dev

      - name: Rebalance Project Status
        env:
          # Use a PAT that can access user-level Projects v2 (GITHUB_TOKEN cannot for user-owned projects)
          TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_NUMBER: 1
          PROJECT_STATUS_FIELD_NAME: Status
        run: node scripts/rebalance-lanes.js
