name: Auto-Merge on Approval

# Triggered when a pull request review is submitted
on:
  pull_request_review:
    types: [submitted]

# Prevent concurrent runs for the same PR to avoid double-merge races.
# Fall back to run_id if PR number is somehow absent.
concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: 🚀 Auto-Merge Approved PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    # Only run when the review state is 'approved'
    if: github.event.review.state == 'approved'

    steps:
      - name: Gate, merge, update labels, and post comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const reviewer = context.payload.review.user.login;

            // ── Gate 1: fetch fresh PR metadata ─────────────────────────────
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // ── Gate 2: skip draft PRs ───────────────────────────────────────
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft — skipping auto-merge.`);
              return;
            }

            // ── Gate 3: only merge PRs targeting the default branch ──────────
            const defaultBranch = context.payload.repository.default_branch;
            if (pr.base.ref !== defaultBranch) {
              console.log(`PR #${prNumber} targets '${pr.base.ref}', not '${defaultBranch}' — skipping auto-merge.`);
              return;
            }

            // ── Gate 4: require awaiting-approval label ──────────────────────
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('awaiting-approval')) {
              console.log(`PR #${prNumber} does not have the 'awaiting-approval' label — skipping auto-merge.`);
              return;
            }

            // ── Squash-merge using the head SHA that was approved ────────────
            const headSha = pr.head.sha;
            let mergeSha;
            try {
              const result = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                sha: headSha,
              });
              mergeSha = result.data.sha;
              console.log(`Merged PR #${prNumber} (head ${headSha}) → commit ${mergeSha}`);
            } catch (e) {
              core.setFailed(`Failed to merge PR #${prNumber}: ${e.message}`);
              return;
            }

            // ── Remove awaiting-approval label (ignore 404) ──────────────────
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'awaiting-approval',
              });
            } catch (e) {
              if (e.status !== 404) {
                core.warning(`Could not remove 'awaiting-approval' label: ${e.message}`);
              }
            }

            // ── Ensure the 'merged' label exists, then apply it ──────────────
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'merged',
              });
            } catch (e) {
              if (e.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: 'merged',
                    color: '0075ca', // GitHub's default blue
                    description: 'PR has been merged',
                  });
                } catch (createErr) {
                  core.warning(`Could not create 'merged' label: ${createErr.message}`);
                }
              } else {
                core.warning(`Could not verify 'merged' label: ${e.message}`);
              }
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['merged'],
              });
            } catch (e) {
              core.warning(`Could not add 'merged' label: ${e.message}`);
            }

            // ── Post a final comment with the merge commit SHA ───────────────
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ✅ PR Merged Successfully',
                  '',
                  `This PR has been automatically squash-merged following approval by @${reviewer}.`,
                  '',
                  `**Merge commit SHA:** \`${mergeSha}\``,
                  '',
                  '_Any issues linked with `Closes #NNN` or `Fixes #NNN` in the PR body have been automatically closed by GitHub._',
                ].join('\n'),
              });
            } catch (e) {
              core.warning(`Could not post merge comment: ${e.message}`);
            }
