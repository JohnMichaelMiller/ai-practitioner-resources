name: Auto-Abandon Stale Issues

# Implements the Needs_Details --> Auto_Abandoned transition from the issue lifecycle state machine.
# Issues labeled 'needs-details' that receive no response within 30 days are automatically closed.
# Reference: .github/workflows/ISSUE_LIFECYCLE_STATE_DIAGRAM.md

on:
  schedule:
    - cron: "0 9 * * *" # Daily at 9 AM UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  auto-abandon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Only process issues that carry the 'needs-details' label (Needs_Details state)
          only-labels: "needs-details"

          # Mark as stale after 30 days without activity
          days-before-stale: 30

          # Close immediately once marked stale (no additional grace period)
          days-before-close: 0

          # Labels applied during the stale/close lifecycle
          stale-issue-label: "auto-abandoned"
          close-issue-label: "auto-abandoned"

          # Remove the stale label if the issue is updated on the same day it is
          # processed (days-before-close: 0 means stale and close happen together,
          # so this primarily guards against the same-day edge case).
          remove-stale-when-updated: true

          # Message posted when the issue is marked stale and closed simultaneously
          stale-issue-message: >
            This issue has been waiting for additional details for 30 days
            without a response and is now being automatically closed.


            **Auto-Abandoned** — No response to request for additional details.


            If you still want to pursue this request, please open a new issue
            using the appropriate template and fill in all required fields.
            This ensures the issue enters the correct validation state and
            receives proper triage.

          # Message posted when the issue is closed
          close-issue-message: >
            Closing this issue due to 30 days of inactivity while waiting for
            additional details.


            **Auto-Abandoned** — Issue lifecycle state: `Auto_Abandoned → [*]`


            To re-open this request, create a new issue with all required
            fields completed. See `.github/ISSUE_TEMPLATE/` for available
            templates.

          # Avoid hitting rate limits on repositories with many issues
          operations-per-run: 30
