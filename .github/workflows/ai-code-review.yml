name: AI Code Review

# Trigger on PR creation or when code changes are pushed to an open PR
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".github/workflows/*.yml"

jobs:
  ai-code-review:
    name: 🤖 Copilot AI Code Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: pr_details
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            console.log('PR Number:', pr.number);
            console.log('PR Title:', pr.title);
            console.log('PR Author:', pr.user.login);

            // Output for use in subsequent steps
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_author', pr.user.login);

      - name: Get changed files
        id: changed_files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const fileList = files.map(f => f.filename).join('\n');
            core.setOutput('files', fileList);
            console.log('Changed files:', fileList);

      - name: Get PR diff
        id: pr_diff
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('pr_diff', pr.diff_url);
            console.log('Diff URL:', pr.diff_url);

      - name: Check for existing review comments and determine status
        id: review_check
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              // Get all comments on the PR
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              // Count review rounds (look for "Code Review - Round" comments)
              const reviewRounds = comments.filter(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('🤖 Code Review - Round')
              ).length;

              const reviewRound = reviewRounds + 1;
              let status = 'initial';

              if (reviewRounds >= 3) {
                status = 'escalate';
              } else if (reviewRounds > 0) {
                status = 'continue';
              }

              core.setOutput('review_rounds', reviewRounds.toString());
              core.setOutput('review_round', reviewRound.toString());
              core.setOutput('status', status);

              console.log(`Review rounds: ${reviewRounds}, Next round: ${reviewRound}, Status: ${status}`);
            } catch (error) {
              console.log('Could not retrieve existing reviews:', error.message);
              core.setOutput('review_rounds', '0');
              core.setOutput('review_round', '1');
              core.setOutput('status', 'initial');
            }

      - name: Validate PR format (Stage 1)
        id: format_check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const body = pr.body || '';

            const failures = [];

            // 1. Title follows category: description convention (case-insensitive)
            const validTypes = ['fix', 'feat', 'feature', 'chore', 'docs', 'refactor', 'test', 'style', 'perf'];
            const titleRegex = new RegExp(`^(${validTypes.join('|')}):`, 'i');
            if (!titleRegex.test(title)) {
              failures.push(`❌ **PR title** must follow \`type: description\` format (e.g. \`feature: add login page\`). Valid types (case-insensitive): ${validTypes.map(t => `\`${t}\``).join(', ')}.`);
            }

            // 2. Body is not empty and >= 100 chars
            if (!body || body.trim().length < 100) {
              failures.push('❌ **PR body** must be present and at least 100 characters long.');
            }

            // 3. Body contains Closes #NNN or Fixes #NNN
            if (!/(?:Closes|Fixes)\s+#\d+/i.test(body)) {
              failures.push('❌ **PR body** must contain an issue reference such as `Closes #123` or `Fixes #123` (case-insensitive).');
            }

            // 4. No empty template sections — matches an H3 heading followed only by
            //    whitespace until the next H3 heading or end of body
            if (/###[^\n]*\n\s*\n(?=###|$)/.test(body)) {
              failures.push('❌ **PR body** contains empty template sections. Please fill in all sections before submitting.');
            }

            const labelName = failures.length > 0 ? 'pr-format-invalid' : 'pr-format-valid';
            const oppositeLabelName = failures.length > 0 ? 'pr-format-valid' : 'pr-format-invalid';

            // Remove the opposite label first (ignore 404 if it isn't present)
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: oppositeLabelName,
              });
            } catch (e) {
              if (e.status !== 404) {
                console.log(`Could not remove label ${oppositeLabelName}: ${e.message}`);
              }
            }

            // Add appropriate label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [labelName],
              });
            } catch (e) {
              console.log(`Could not add label ${labelName}: ${e.message}`);
            }

            if (failures.length > 0) {
              const comment = [
                '## ❌ Stage 1 — PR Format Validation Failed',
                '',
                'The following format issues must be resolved before this PR can proceed:',
                '',
                ...failures,
                '',
                '---',
                '_Please update the PR title and/or body and push again to re-trigger validation._',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });

              core.setFailed('PR format validation failed. See PR comment for details.');
            } else {
              console.log('✅ PR format validation passed.');
            }

      - name: Add in-review label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['in-review'],
            });

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run AI Code Review (Stage 2)
        id: ai_review
        # Skip if we have already exceeded the review round limit (status == 'escalate')
        if: steps.review_check.outputs.status != 'escalate'
        continue-on-error: true
        run: node scripts/ai-code-review.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ steps.pr_details.outputs.pr_number }}
          REVIEW_ROUND: ${{ steps.review_check.outputs.review_round }}

      - name: Escalate to human review
        # Escalate when status is already 'escalate' (4th+ push) OR after round 3 with no approval
        if: >-
          steps.review_check.outputs.status == 'escalate' ||
          (steps.review_check.outputs.review_round == '3' &&
           steps.ai_review.outputs.approved != 'true')
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-review label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'in-review',
              });
            } catch (e) {
              console.log('Label not present, continuing');
            }

            // Add escalation label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ai-review-escalated'],
            });

            // Post escalation comment
            const escalationMsg = '## ⚠️ Code Review - Round 3/3 - ESCALATED\n\n'
              + 'After 3 review cycles, this PR requires human evaluation.\n\n'
              + '### Summary\n'
              + '- **Rounds Completed**: 3/3\n'
              + '- **Status**: Escalated for human review\n'
              + '- **Next**: Will be assigned to a human maintainer\n\n'
              + 'Please see the previous review comments for details on the issues that require human judgment.\n\n'
              + '---\n\n'
              + '**Labels Added**: `ai-review-escalated`';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: escalationMsg,
            });

      - name: Request human review if escalated
        if: >-
          steps.review_check.outputs.status == 'escalate' ||
          (steps.review_check.outputs.review_round == '3' &&
           steps.ai_review.outputs.approved != 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = ['${{ github.repository_owner }}'];

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: assignees,
              });
            } catch (e) {
              console.log('Could not assign, repository owner may need permissions');
            }

      - name: Fail if AI review did not approve
        # Run when the AI review step ran (not skipped) and did not approve
        if: >-
          steps.ai_review.outcome != 'skipped' &&
          (steps.ai_review.outcome != 'success' ||
           steps.ai_review.outputs.approved != 'true')
        run: |
          echo "AI code review did not approve this PR. Address the issues in the review comment and push new commits."
          exit 1

  acceptance-criteria:
    name: ✅ Acceptance Criteria Verification
    runs-on: ubuntu-latest
    needs: ai-code-review

    permissions:
      contents: read
      pull-requests: write
      issues: write

    # Only run if review wasn't escalated
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Check acceptance criteria (Stage 3)
        id: criteria
        run: node scripts/ac-check.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  ci-checks:
    name: 🔍 CI/CD Checks
    runs-on: ubuntu-latest
    needs: acceptance-criteria

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        id: lint
        run: |
          npm run lint 2>&1 || true
          echo "lint_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run tests
        id: tests
        run: |
          npm test 2>&1 || true
          echo "test_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Validate schema
        id: schema
        run: |
          npm run validate 2>&1 || true
          echo "schema_status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post CI results
        uses: actions/github-script@v7
        with:
          script: |
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === '0' ? '✅' : '❌';
            const testStatus = '${{ steps.tests.outputs.test_status }}' === '0' ? '✅' : '❌';
            const schemaStatus = '${{ steps.schema.outputs.schema_status }}' === '0' ? '✅' : '❌';

            const message = `## 🔍 CI/CD Checks\n\n`;
            message += `${lintStatus} **Linting**: Passed\n`;
            message += `${testStatus} **Tests**: Passed\n`;
            message += `${schemaStatus} **Schema Validation**: Passed\n\n`;
            message += `All automated checks completed.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });

  ready-for-approval:
    name: 👤 Request Human Approval
    runs-on: ubuntu-latest
    needs: [ai-code-review, ci-checks]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add approval-ready labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['awaiting-approval', 'ai-review-approved'],
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'in-review',
              });
            } catch (e) {
              console.log('Label not present');
            }

      - name: Post approval request
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## 👤 Ready for Human Approval\n\n`;
            message += `All automated checks have passed:\n\n`;
            message += `- ✅ AI code review completed\n`;
            message += `- ✅ Acceptance criteria verified\n`;
            message += `- ✅ CI/CD checks passing\n\n`;
            message += `**This PR is now ready for human maintainer approval.**\n\n`;
            message += `@${{ github.repository_owner }} or an assigned maintainer will review and approve shortly.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message,
            });
